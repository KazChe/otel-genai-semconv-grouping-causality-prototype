services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (demos send traces here)
      - "8888:8888"   # Collector metrics
    environment:
      - GALILEO_CONSOLE_URL=${GALILEO_CONSOLE_URL:-https://app.galileo.ai}
      - GALILEO_API_KEY=${GALILEO_API_KEY:-}
      - GALILEO_PROJECT=${GALILEO_PROJECT:-oss-contrib-prototypes}
      - GALILEO_LOG_STREAM=${GALILEO_LOG_STREAM:-dev}
    depends_on:
      - aspire
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI (tag-based search for multi-dimensional queries)
      - "4317"         # OTLP gRPC (internal, collector connects here)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  aspire:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: aspire
    ports:
      - "18888:18888"  # Aspire dashboard UI
      - "18889:18889"  # OTLP gRPC receiver
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
